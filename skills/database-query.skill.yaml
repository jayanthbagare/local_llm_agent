# ── Database Query Skill (MCP) ──
# Connects to a remote MCP server to execute SQL queries.
id: database-query
name: "Database Query"
version: "1.0.0"
description: "Execute read-only SQL queries against a connected database via MCP server."
author: "local-llm-agent"
license: MIT
tags: [database, sql, mcp, data]

trigger:
  keywords: ["database", "sql", "query the database", "run a query", "fetch from db", "select from"]
  patterns:
    - "query the database for {sql}"
    - "run sql: {sql}"
    - "fetch {description} from database"

tool:
  type: mcp
  server:
    transport: sse
    url: "{{MCP_DATABASE_URL}}"
    # URL injected from environment/settings at runtime

  toolName: "read_query"

  parameters:
    sql:
      type: string
      description: "A read-only SQL SELECT query to execute"
      required: true
      maxLength: 4096

  transform: |
    return {
      columns: response.columns,
      rows: response.rows,
      rowCount: response.rows?.length || 0
    };

  retry:
    maxAttempts: 1

resultTemplate: |
  Query returned {{rowCount}} row(s):
  | {{#each columns}}{{this}} | {{/each}}
  |{{#each columns}}---|{{/each}}
  {{#each rows}}
  | {{#each ../columns}} {{lookup ../this this}} | {{/each}}
  {{/each}}
  {{#unless rowCount}}
  (empty result set)
  {{/unless}}

permissions:
  - network: "{{MCP_DATABASE_URL}}"
  - description: "Execute read-only database queries via MCP server"
