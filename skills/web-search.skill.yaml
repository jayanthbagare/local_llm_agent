# ── Web Search Skill ──
# DuckDuckGo-powered web search that returns structured results for the LLM.
id: web-search
name: "Web Search"
version: "1.2.0"
description: "Search the web using DuckDuckGo and return top results as structured snippets."
author: "local-llm-agent"
license: MIT
tags: [search, web, retrieval, knowledge]

trigger:
  keywords: ["search", "find online", "look up on the web", "google", "web search", "internet search"]
  patterns:
    - "search for {query}"
    - "find information about {query}"
    - "what does the web say about {query}"

tool:
  type: rest
  method: GET
  url: "https://api.duckduckgo.com/"
  queryParams:
    q: "{{query}}"
    format: "json"
    no_html: "1"
    skip_disambig: "1"
  headers:
    Accept: "application/json"

  parameters:
    query:
      type: string
      description: "The search query string"
      required: true
      maxLength: 300

  transform: |
    const items = response.RelatedTopics || [];
    return items
      .filter(r => r.Text && r.FirstURL)
      .slice(0, 5)
      .map(r => {
        const parts = r.Text.split(' - ');
        return {
          title: parts.length > 1 ? parts[0] : r.Text.slice(0, 80),
          snippet: parts.length > 1 ? parts.slice(1).join(' - ') : '',
          url: r.FirstURL
        };
      });

  retry:
    maxAttempts: 2
    backoff: exponential
    baseDelay: 1000

resultTemplate: |
  Web search results for "{{query}}":
  {{#each results}}
  {{@index}}. **{{title}}** {{#if snippet}}— {{snippet}}{{/if}}
     {{url}}
  {{/each}}
  {{#unless results.length}}
  No relevant results found.
  {{/unless}}

permissions:
  - network: "api.duckduckgo.com"
  - description: "Send search queries to DuckDuckGo to retrieve web results"
