# ── Calendar Skill (Browser API) ──
# Reads the user's local calendar data or creates calendar events via the Web Calendar API.
id: calendar
name: "Calendar Access"
version: "1.0.0"
description: "Read upcoming events and create new calendar entries using browser calendar APIs."
author: "local-llm-agent"
license: MIT
tags: [calendar, events, productivity, browser-api]

trigger:
  keywords: ["calendar", "schedule", "event", "appointment", "meeting", "remind me", "upcoming events"]
  patterns:
    - "what's on my calendar {timeframe}"
    - "add event {title} on {date}"
    - "schedule {title} for {date}"
    - "my events {timeframe}"

tool:
  type: browser-api
  api: "calendar"

  parameters:
    action:
      type: string
      description: "Calendar action to perform"
      enum: ["list", "create", "delete", "update"]
      required: true
    title:
      type: string
      description: "Event title (for create/update)"
    start:
      type: string
      description: "Start date/time in ISO 8601 format"
    end:
      type: string
      description: "End date/time in ISO 8601 format"
    timeframe:
      type: string
      description: "Time range for list action"
      enum: ["today", "tomorrow", "this_week", "next_week", "this_month"]
      default: "this_week"
    eventId:
      type: string
      description: "Event ID (for delete/update)"

  # Browser-side implementation
  execute: |
    // Uses: navigator.calendar (experimental) or Google Calendar API via OAuth
    // Falls back to localStorage-based calendar for offline
    
    switch (params.action) {
      case 'list': {
        // Read from local calendar store
        const events = await calendarStore.list(params.timeframe || 'this_week');
        return {
          timeframe: params.timeframe,
          events: events.map(e => ({
            id: e.id,
            title: e.title,
            start: e.start,
            end: e.end,
            location: e.location || null
          })),
          count: events.length
        };
      }
      case 'create': {
        const event = await calendarStore.create({
          title: params.title,
          start: params.start,
          end: params.end
        });
        return { created: true, event };
      }
      default:
        throw new Error(`Unknown action: ${params.action}`);
    }

  retry:
    maxAttempts: 1

resultTemplate: |
  {{#if (eq action "list")}}
  📅 **Calendar — {{timeframe}}** ({{count}} events)
  {{#each events}}
  - **{{title}}** — {{start}}{{#if location}} @ {{location}}{{/if}}
  {{/each}}
  {{#unless events.length}}
  No events scheduled.
  {{/unless}}
  {{/if}}
  
  {{#if (eq action "create")}}
  ✅ Created event: **{{event.title}}** on {{event.start}}
  {{/if}}

permissions:
  - browser-api: "calendar"
  - description: "Read and create calendar events. Data stays local."
