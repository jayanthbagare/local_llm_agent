# ── Calculator Skill (Sandboxed Function) ──
# Evaluates mathematical expressions safely in a sandboxed WebWorker.
id: calculator
name: "Calculator"
version: "1.0.0"
description: "Evaluate mathematical expressions with support for basic arithmetic, trigonometry, logarithms, and constants."
author: "local-llm-agent"
license: MIT
tags: [math, calculator, utility]

trigger:
  keywords: ["calculate", "compute", "evaluate", "math", "solve", "what is"]
  patterns:
    - "calculate {expression}"
    - "what is {expression}"
    - "compute {expression}"

tool:
  type: function
  
  parameters:
    expression:
      type: string
      description: "Mathematical expression to evaluate (e.g., '2 + 2 * 3', 'sqrt(16)', 'sin(pi/2)')"
      required: true
      maxLength: 500

  # Sandboxed JS executed in isolated WebWorker
  execute: |
    // Allowed: Math.*, basic arithmetic, parentheses
    // Blocked: prototype access, constructors, eval, Function, import
    const sanitized = expression.replace(/[^0-9+\-*/().%\s\w,]/g, '');
    
    // Whitelist of allowed Math functions and constants
    const allowed = {
      abs: Math.abs, acos: Math.acos, acosh: Math.acosh,
      asin: Math.asin, asinh: Math.asinh, atan: Math.atan,
      atan2: Math.atan2, atanh: Math.atanh, cbrt: Math.cbrt,
      ceil: Math.ceil, cos: Math.cos, cosh: Math.cosh,
      exp: Math.exp, floor: Math.floor, log: Math.log,
      log10: Math.log10, log2: Math.log2, max: Math.max,
      min: Math.min, pow: Math.pow, round: Math.round,
      sign: Math.sign, sin: Math.sin, sinh: Math.sinh,
      sqrt: Math.sqrt, tan: Math.tan, tanh: Math.tanh,
      trunc: Math.trunc,
      PI: Math.PI, E: Math.E, LN2: Math.LN2, LN10: Math.LN10
    };
    
    const fn = new Function(...Object.keys(allowed), `"use strict"; return (${sanitized})`);
    const result = fn(...Object.values(allowed));
    
    if (typeof result !== 'number' || !isFinite(result)) {
      throw new Error('Invalid result: ' + result);
    }
    
    return { expression, result };

  retry:
    maxAttempts: 0

resultTemplate: |
  `{{expression}}` = **{{result}}**

permissions:
  - description: "Evaluate mathematical expressions locally (no network access)"
