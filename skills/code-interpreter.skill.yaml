# ── Code Interpreter Skill (Sandboxed) ──
# Executes JavaScript snippets in a sandboxed WebWorker with a timeout.
id: code-interpreter
name: "Code Interpreter"
version: "1.1.0"
description: "Execute JavaScript code in a sandboxed environment. Returns stdout-like output. Great for data transformations, quick calculations, and prototyping."
author: "local-llm-agent"
license: MIT
tags: [code, javascript, sandbox, interpreter]

trigger:
  keywords: ["run code", "execute javascript", "eval", "run js", "execute code", "run script"]
  patterns:
    - "run this code: {code}"
    - "execute: {code}"
    - "run in js: {code}"

tool:
  type: function

  parameters:
    code:
      type: string
      description: "JavaScript code to execute. Use `print(...)` or `console.log(...)` to output values. Return value is captured as final result."
      required: true
      maxLength: 10000
    timeout:
      type: number
      description: "Execution timeout in milliseconds"
      default: 5000
      minimum: 100
      maximum: 30000

  execute: |
    // Runs inside a WebWorker with:
    // - No DOM access
    // - No network access
    // - Timeout enforcement
    // - Max memory limit
    // - Console.log/stdout capture
    
    const startTime = performance.now();
    const logs = [];
    
    // Override console.log to capture output
    const originalLog = console.log;
    console.log = (...args) => {
      logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
    };
    
    try {
      // Execute with timeout
      const result = await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('Execution timed out')), params.timeout);
        try {
          const fn = new Function('"use strict"; ' + params.code);
          const val = fn();
          clearTimeout(timer);
          resolve(val);
        } catch (e) {
          clearTimeout(timer);
          reject(e);
        }
      });
      
      return {
        output: logs.join('\n'),
        result: result !== undefined ? String(result) : undefined,
        executionTime: Math.round(performance.now() - startTime) + 'ms'
      };
    } catch (e) {
      return {
        error: e.message,
        output: logs.join('\n'),
        executionTime: Math.round(performance.now() - startTime) + 'ms'
      };
    } finally {
      console.log = originalLog;
    }

  retry:
    maxAttempts: 0

resultTemplate: |
  {{#if error}}
  ❌ **Error:** {{error}}
  {{/if}}
  {{#if output}}
  ```
  {{output}}
  ```
  {{/if}}
  {{#if result}}
  **Result:** `{{result}}`
  {{/if}}
  _Executed in {{executionTime}}_

permissions:
  - description: "Execute JavaScript locally in a sandboxed worker (no network, no DOM)"
